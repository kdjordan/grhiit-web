server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Behind Coolify/Traefik: emit relative redirects so trailing-slash
    # redirects keep the real host + https scheme instead of forcing http://localhost
    absolute_redirect off;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed Nuxt assets are immutable — cache hard
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /images/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # SSG routes: try file, directory index, then prerendered .html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
